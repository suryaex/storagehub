upstream storagehub_backend {
    server backend:8000;
}

upstream storagehub_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # allow large uploads (chunked uploads still recommended for >50GB)
    client_max_body_size 0;
    proxy_request_buffering off;

    # ── API ──
    location /api/ {
        proxy_pass http://storagehub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /docs   { proxy_pass http://storagehub_backend; proxy_set_header Host $host; }
    location /redoc  { proxy_pass http://storagehub_backend; proxy_set_header Host $host; }

    # ── Frontend SPA ──
    location / {
        proxy_pass http://storagehub_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;
    gzip_min_length 1024;
}
