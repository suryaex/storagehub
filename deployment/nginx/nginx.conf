# StorageHub reverse proxy (Docker).
#
# Uses Docker's embedded DNS (127.0.0.11) with variable proxy_pass so nginx
# RE-RESOLVES the backend/frontend container IPs at runtime. Without this, nginx
# caches the upstream IP at startup and returns 502 forever once a container
# restarts and gets a new IP.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 80;
    server_name _;

    # allow large uploads (chunked upload still recommended for >50GB)
    client_max_body_size 0;
    proxy_request_buffering off;

    # ── API ──
    location /api/ {
        set $sh_backend backend;
        proxy_pass http://$sh_backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /docs {
        set $sh_backend backend;
        proxy_pass http://$sh_backend:8000/docs;
        proxy_set_header Host $host;
    }
    location = /redoc {
        set $sh_backend backend;
        proxy_pass http://$sh_backend:8000/redoc;
        proxy_set_header Host $host;
    }

    # ── Frontend SPA ──
    location / {
        set $sh_frontend frontend;
        proxy_pass http://$sh_frontend:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;
    gzip_min_length 1024;
}
