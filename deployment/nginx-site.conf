# StorageHub — Nginx site config (bare-metal production)
# Placeholders {{SERVER_NAME}} / {{FRONTEND_ROOT}} are rendered by deploy-prod.sh
server {
    listen {{HTTP_PORT}};
    listen [::]:{{HTTP_PORT}};
    server_name {{SERVER_NAME}};

    root {{FRONTEND_ROOT}};
    index index.html;

    # Allow very large uploads (chunked upload still recommended for >50GB)
    client_max_body_size 0;
    proxy_request_buffering off;

    # ── Backend API (FastAPI / uvicorn on 127.0.0.1:{{BACKEND_PORT}}) ──
    location /api/ {
        proxy_pass http://127.0.0.1:{{BACKEND_PORT}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # OpenAPI docs
    location = /docs   { proxy_pass http://127.0.0.1:{{BACKEND_PORT}}; proxy_set_header Host $host; }
    location = /redoc  { proxy_pass http://127.0.0.1:{{BACKEND_PORT}}; proxy_set_header Host $host; }

    # ── Frontend SPA ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;
    gzip_min_length 1024;
}
