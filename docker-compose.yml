services:
  mysql:
    # MariaDB (not MySQL) so the image also runs on ARM — arm64 AND armv7
    # (Raspberry Pi / Orange Pi). The mariadb image accepts the MYSQL_* env
    # vars for drop-in compatibility, and PyMySQL talks to it unchanged.
    image: mariadb:11
    container_name: storagehub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-storagehub}
      MYSQL_USER: ${MYSQL_USER:-storagehub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-storagehub}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      # Use MariaDB's bundled healthcheck.sh — the mysqladmin binary was removed in
      # mariadb:11, so the old "mysqladmin ping" check always failed and left the
      # container permanently "unhealthy", which blocked backend + nginx from starting.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - storagehub

  backend:
    image: ghcr.io/suryaex/storagehub-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storagehub-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-storagehub}:${MYSQL_PASSWORD:-storagehub}@mysql:3306/${MYSQL_DATABASE:-storagehub}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      STORAGE_ROOT: /data/storage
      ALLOW_LOCAL_LOGIN: ${ALLOW_LOCAL_LOGIN:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
      DEFAULT_USER_QUOTA: ${DEFAULT_USER_QUOTA:-10737418240}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-53687091200}
      UPLOAD_CHUNK_SIZE: ${UPLOAD_CHUNK_SIZE:-8388608}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
    volumes:
      - storage_data:/data/storage
    expose:
      - "8000"
    networks:
      - storagehub

  frontend:
    image: ghcr.io/suryaex/storagehub-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: storagehub-frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      # use 127.0.0.1 (not localhost) — nginx here listens IPv4 only, and
      # "localhost" can resolve to IPv6 ::1 first and fail the check.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - storagehub

  nginx:
    image: nginx:alpine
    container_name: storagehub-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      # Host port 8080 by default so StorageHub does NOT collide with SecureOps
      # (which owns host :80/:443). Override with HTTP_PORT in .env if needed.
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - storagehub

volumes:
  mysql_data:
  storage_data:

networks:
  storagehub:
    driver: bridge
